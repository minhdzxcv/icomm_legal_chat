services:
  legal-chatbot-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: legal-chatbot-gpu
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    # Enable GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: legal-chatbot-frontend
    ports:
      - "3000:80"
    depends_on:
      - legal-chatbot-gpu
    environment:
      - VITE_API_URL=http://localhost:8000
